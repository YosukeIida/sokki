name: sokki

options:
  bundleIdPrefix: com.yosukeiida
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    # pre-1.0 は minor でも破壊的変更がありうるため upToNextMinor 相当（minorVersion）で上限を絞る
    # Package.swift の .upToNextMinor(from: "0.15.5") と同じ意図
    minorVersion: 0.15.5

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  SokkiKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SokkiKit
        excludes:
          - Info.plist
    info:
      path: Sources/SokkiKit/Info.plist
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
      - package: argmax-oss-swift
        product: SpeakerKit
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yosukeiida.sokkikit
        ENABLE_DEBUG_DYLIB: YES
        DEFINE_MODULE: YES
        CODE_SIGN_STYLE: Automatic
        VERSIONING_SYSTEM: ""
        FRAMEWORK_VERSION: A

  sokki:
    type: application
    platform: macOS
    sources:
      - Sources/sokki
    info:
      path: Info.plist
      properties:
        NSMicrophoneUsageDescription: "録音した音声を文字起こしするためにマイクを使用します。"
        NSSpeechRecognitionUsageDescription: "録音した音声を文字起こしするために音声認識を使用します。"
        NSAudioCaptureUsageDescription: "会議やメディアなどのシステム音声を文字起こしするために、この Mac で再生中の音声を取り込みます。"
    entitlements:
      path: sokki.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.device.screen-capture: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    dependencies:
      - target: SokkiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yosukeiida.sokki
        ENABLE_DEBUG_DYLIB: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          ENABLE_DEBUG_DYLIB: YES

  sokkiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/sokkiTests
    dependencies:
      - target: SokkiKit
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yosukeiida.sokkiTests
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES

  sokkiUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/sokkiUITests
    dependencies:
      - target: sokki
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yosukeiida.sokkiUITests
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: sokki

schemes:
  # 通常の開発・CI 用 scheme。実機マイクを使う UI テストは含めない
  # （TCC 未許可・モデル未取得の環境でも再現可能にするため）。
  sokki:
    build:
      targets:
        sokki: all
        sokkiTests: [test]
    test:
      targets:
        - sokkiTests

  # 実機マイクを使う E2E 専用 scheme。マイクのアクセス許可を事前に付与した上で
  # 明示的にこの scheme を選んで実行する（xcodebuild test -scheme sokkiE2E）。
  sokkiE2E:
    build:
      targets:
        sokki: all
        sokkiUITests: [test]
    test:
      targets:
        - sokkiUITests
